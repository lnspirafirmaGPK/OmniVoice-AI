name: main

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Validate, test, and smoke-check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Validate required docs
        shell: bash
        run: |
          set -e

          if [ ! -f AGENTS.md ]; then
            echo "AGENTS.md is required by repository policy."
            exit 1
          fi

          if [ ! -f README.md ]; then
            echo "README.md is required."
            exit 1
          fi

          if ! grep -qi "OmniVoice AI" AGENTS.md; then
            echo "AGENTS.md must reference OmniVoice AI."
            exit 1
          fi

      - name: Check optional environment example
        shell: bash
        run: |
          if [ -f .env.example ]; then
            echo ".env.example found"
          else
            echo "::warning::.env.example not found. Recommended for production setup."
          fi

      - name: Install dependencies
        shell: bash
        run: |
          set -e

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Run build
        run: npm run build --if-present

      - name: Run health check
        run: npm run health --if-present
